name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

jobs:
  fmt-lint-unit:
    name: fmt / lint / typecheck / tests / coverage / build / release checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - run: python -m pip install -q -e '.[dev]'
      - run: ruff format --diff blender_mobile_3d tests scripts
      - run: ruff check blender_mobile_3d tests scripts
      - run: mypy blender_mobile_3d --ignore-missing-imports
      - run: pytest -q --cov=blender_mobile_3d --cov-report=xml --cov-fail-under=80
      - run: python -m zipfile -c dist/release-check.zip blender_mobile_3d
      - run: python scripts/release_artifacts.py
      - run: python scripts/verify_addon_state.py --zip dist/blender_mobile_3d-1.0.0.zip
      - run: python scripts/verify_release_checks.py
      - run: python -m zipfile -c dist/blender_mobile_3d-1.0.0.zip blender_mobile_3d || true
      - run: python scripts/release_artifacts.py

  security:
    name: security audit + secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -q -e '.[dev]'
      - run: pip-audit -q
      - run: ruff check blender_mobile_3d tests scripts --select S
      - run: test -z "$(grep -Rin --include='*.py' --include='*.json' --include='*.md' -E '' . || true)"

  blender-regression:
    name: Blender headless add-on regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: wget -q https://download.blender.org/release/Blender4.3/blender-4.3.2-linux-x64.tar.xz
      - run: tar -xf blender-4.3.2-linux-x64.tar.xz
      - run: sudo mv blender-4.3.2-linux-x64 /opt/blender || true && ln -sf /opt/blender/blender /usr/local/bin/blender || true
      - run: python -m pip install -q -e '.[dev]'
      - run: BLENDER_USER_CONFIG=/tmp/blender-ci blender --background --factory-startup --python scripts/smoke_test_blender.py --python scripts/verify_addon_state.py
