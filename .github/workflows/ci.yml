name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  packaging-python:
    name: Python packaging
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -q -e '.[dev]' -e installers/python
      - run: ruff format --check blender_mobile_3d installers/python tests scripts
      - run: ruff check blender_mobile_3d installers/python tests scripts
      - run: mypy blender_mobile_3d
      - run: >
          pytest
          --cov=blender_mobile_3d
          --cov=blender_mobile_3d_installer
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=90
      - run: |
          python -m pip install -q build twine
          python -m build installers/python
          python -m twine check installers/python/dist/*
      - name: Install the built wheel (not editable) and exercise the real CLI
        run: |
          python -m venv "$RUNNER_TEMP/wheel-venv"
          "$RUNNER_TEMP/wheel-venv/bin/pip" install -q installers/python/dist/*.whl
          cd "$RUNNER_TEMP"
          test "$("$RUNNER_TEMP/wheel-venv/bin/blender-mobile-3d" version)" = "1.0.0"
          "$RUNNER_TEMP/wheel-venv/bin/blender-mobile-3d" help
          "$RUNNER_TEMP/wheel-venv/bin/blender-mobile-3d" list-blenders --json
          set +e
          "$RUNNER_TEMP/wheel-venv/bin/blender-mobile-3d" doctor --json
          code=$?
          set -e
          test "$code" = "3"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: python-logs-${{ matrix.python-version }}
          path: |
            .mypy_cache
            .pytest_cache

  packaging-npm:
    name: npm packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: installers/npm/package-lock.json
      - working-directory: installers/npm
        run: npm ci
      - working-directory: installers/npm
        run: npm run lint
      - working-directory: installers/npm
        run: npm test
      - working-directory: installers/npm
        run: npm run pack
      - name: Install the packed tarball (not source) and exercise the real CLI
        run: |
          mkdir -p "$RUNNER_TEMP/npm-install-test"
          cd "$RUNNER_TEMP/npm-install-test"
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE"/installers/npm/*.tgz
          BIN="$PWD/node_modules/.bin/blender-mobile-3d"
          test "$("$BIN" version)" = "1.0.0"
          "$BIN" help
          "$BIN" list-blenders --json
          set +e
          "$BIN" doctor --json
          code=$?
          set -e
          test "$code" = "3"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-tgz
          path: installers/npm/*.tgz
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: npm-logs
          path: installers/npm/test-results.xml

  security:
    name: security
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.24.3"
      GITLEAKS_SHA256: "9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -q -e '.[dev]' -e installers/python
      - run: python -m pip install -q pip-audit
      - run: python -m pip_audit
      - run: ruff check blender_mobile_3d installers/python/src scripts --select S
      - name: Secret scan (gitleaks, pinned)
        run: |
          curl -sSfL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks dir . --no-banner --redact

  blender-regression:
    name: Blender headless regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
      - run: python -m pip install -q -e '.[dev]'
      - name: Build release ZIP
        run: python scripts/release_artifacts.py
      - name: Install Blender 4.3.2
        run: |
          wget -q https://download.blender.org/release/Blender4.3/blender-4.3.2-linux-x64.tar.xz
          tar -xf blender-4.3.2-linux-x64.tar.xz
          sudo mv blender-4.3.2-linux-x64 /opt/blender
          sudo ln -sf /opt/blender/blender /usr/local/bin/blender
          blender --version
      - name: Run core add-on regression suite
        run: |
          BLENDER_USER_RESOURCES="$RUNNER_TEMP/blender-user" blender --background --factory-startup \
            --python scripts/blender_regression.py -- \
            --zip dist/blender_mobile_3d-1.0.0.zip \
            --output "$RUNNER_TEMP/bm3d-regression" | tee regression.log
          grep -q "REGRESSION_RESULT: PASS" regression.log
      - name: Build the Python wheel and npm tarball for E2E installer testing
        run: |
          python -m pip install -q build
          python -m build installers/python
          python -m venv "$RUNNER_TEMP/wheel-venv"
          "$RUNNER_TEMP/wheel-venv/bin/pip" install -q installers/python/dist/*.whl
          cd installers/npm
          npm ci
          npm run pack
          cd "$GITHUB_WORKSPACE"
      - name: E2E - Python wheel installer against real Blender (isolated profile)
        run: |
          python scripts/installer_e2e.py \
            --bin "$RUNNER_TEMP/wheel-venv/bin/blender-mobile-3d" \
            --blender /usr/local/bin/blender \
            --zip "$GITHUB_WORKSPACE/dist/blender_mobile_3d-1.0.0.zip" \
            --home "$RUNNER_TEMP/e2e-home-python" \
            --label python-wheel
      - name: E2E - npm tarball installer against real Blender (isolated profile)
        run: |
          mkdir -p "$RUNNER_TEMP/npm-e2e-install"
          cd "$RUNNER_TEMP/npm-e2e-install"
          npm init -y >/dev/null
          npm install "$GITHUB_WORKSPACE"/installers/npm/*.tgz
          cd "$GITHUB_WORKSPACE"
          python scripts/installer_e2e.py \
            --bin "$RUNNER_TEMP/npm-e2e-install/node_modules/.bin/blender-mobile-3d" \
            --blender /usr/local/bin/blender \
            --zip "$GITHUB_WORKSPACE/dist/blender_mobile_3d-1.0.0.zip" \
            --home "$RUNNER_TEMP/e2e-home-npm" \
            --label npm-tgz
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: blender-regression-log
          path: regression.log

  release-manifest:
    name: release manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python -m pip install -q jsonschema
      - run: python scripts/release_artifacts.py
      - run: test -f dist/blender_mobile_3d-1.0.0.zip
      - run: test -f dist/blender_mobile_3d-1.0.0.zip.sha256
      - run: test -f dist/release-manifest.json
      - run: |
          cd dist && sha256sum -c blender_mobile_3d-1.0.0.zip.sha256
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-artifacts
          path: |
            dist/blender_mobile_3d-1.0.0.zip
            dist/blender_mobile_3d-1.0.0.zip.sha256
            dist/release-manifest.json
