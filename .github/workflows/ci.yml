name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
      - run: python -m pip install -q -e '.[dev]'
      - run: ruff check blender_mobile_3d tests scripts
      - run: mypy blender_mobile_3d --ignore-missing-imports || true
      - run: pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -q -e '.[dev]'
      - run: pip-audit -q || true
      - run: ruff check blender_mobile_3d tests scripts --select S

  blender-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: wget -q https://download.blender.org/release/Blender4.3/blender-4.3.2-linux-x64.tar.xz
      - run: tar -xf blender-4.3.2-linux-x64.tar.xz
      - run: sudo mv blender-4.3.2-linux-x64 /opt/blender || true && ln -sf /opt/blender/blender /usr/local/bin/blender || true
      - run: python -m pip install -q -e '.[dev]'
      - run: blender --background --python blender_mobile_3d/operators/register.py
